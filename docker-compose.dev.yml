version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: backend-dev
    container_name: osiris-backend-dev
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DATABASE_PATH=/app/data/osiris-dev.db
      - BACKUP_PATH=/app/backups
      - UPLOAD_PATH=/app/uploads
      - LOG_PATH=/app/logs
      - FRONTEND_URL=http://localhost:3000
      
      # Development credentials
      - JWT_SECRET=dev-jwt-secret-change-in-production
      - LOGIN_USERNAME=${LOGIN_USERNAME:-}
      - LOGIN_PASSWORD=${LOGIN_PASSWORD:-}
      
      # Azure AD (optional in dev)
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID:-}
      - AZURE_TENANT_ID=${AZURE_TENANT_ID:-}
      - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET:-}
      - MAIL_TARGET_ADDRESS=${MAIL_TARGET_ADDRESS:-test@example.com}
    volumes:
      - ./server:/app/backend
      - ./data-dev:/app/data
      - ./backups-dev:/app/backups
      - ./uploads-dev:/app/uploads
      - ./logs-dev:/app/logs
    command: npm run dev
    stdin_open: true
    tty: true

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: frontend-dev
    container_name: osiris-frontend-dev
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:3001
    volumes:
      - ./client:/app/frontend
    depends_on:
      - backend
    command: npm run dev
    stdin_open: true
    tty: true